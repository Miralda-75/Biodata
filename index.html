<!DOCTYPE html>

    <style>
        /* WARNA CUMA ABU & PUTIH */
        body {
            font-family: 'Arial', sans-serif;
            background: #f2f2f2; /* Abu muda */
            color: #333; /* Abu tua */
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {

            /* ANIMASI FOTO */

        }
        .header h1 {

            margin: 20px 0 10px 0;
        }
        .header p {

        }

        h2 {

            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #555;
        }

        /* HOBI CARD */
        .hobi-item {

        .hobi-item img {

            border-radius: 8px;
            margin: 10px 0;
        }

        /* FOOTER */

            padding: 40px 20px;
            background: #e0e0e0; /* Abu */
        }
        footer a {
            color: #333;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        footer a:hover {

        }
    </style>
</head>
<body>

    <div class="container">

    <!-- SCRIPT BUAT ANIMASI -->
    <script>
        const sections = document.querySelectorAll('.section');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    
                    const textEls = entry.target.querySelectorAll('.type-text');
                    textEls.forEach(textEl => {
                        if(!textEl.classList.contains('typed')){
                            const text = textEl.getAttribute('data-text');
                            typeWriter(textEl, text, 40);
                            textEl.classList.add('typed');
                        }
                    });
                }
            });
        }, { threshold: 0.2 });

        sections.forEach(section => {
            observer.observe(section);
        });

        function typeWriter(element, text, speed = 50) {
            let i = 0;
            element.innerHTML = "";
            function typing() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typing, speed);
                }
            }
            typing();
        }
    </script>

</body>
