<!DOCTYPE html>

        /* WARNA CUMA ABU & PUTIH */
        body {

            background: #f2f2f2; /* Abu muda */

        }
        .header h1 {
            font-size: 2.5em;
            margin: 20px 0 10px 0;
        }
        .header p {
            font-size: 1.1em;

        }

        h2 {

            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #555;
        }

        /* HOBI CARD */
        .hobi-item {

        }
        .hobi-item img {

            border-radius: 8px;
            margin: 10px 0;
            filter: grayscale(100%); /* Efek abu2 */
            transition: filter 0.5s;
        }
        .hobi-item img:hover {
            filter: grayscale(0%); /* Pas hover jadi warna */
        }

        /* FOOTER */
        footer {

            padding: 40px 20px;
            background: #e0e0e0; /* Abu */
        }
        footer a {
            color: #333;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        footer a:hover {

        }
    </style>
</head>
<body>

    <!-- SECTION 1: HEADER -->
    <div class="header section">
        <img src="foto.jpeg" alt="Foto Profil">

    <!-- SCRIPT BUAT ANIMASI -->
    <script>
        // 1. ANIMASI MUNCUL PAS SCROLL
        const sections = document.querySelectorAll('.section');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    
                    // 2. JALANKAN KETIK JUGA
                    const textEl = entry.target.querySelector('.type-text');
                    if(textEl && !textEl.classList.contains('typed')){
                        const text = textEl.getAttribute('data-text');
                        typeWriter(textEl, text, 40);
                        textEl.classList.add('typed'); // biar gak keulang
                    }
                }
            });
        }, { threshold: 0.2 });

        sections.forEach(section => {
            observer.observe(section);
        });

        // 3. FUNGSI KETIK PER HURUF
        function typeWriter(element, text, speed = 50) {
            let i = 0;
            element.innerHTML = "";
            function typing() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typing, speed);
                }
            }
            typing();
        }
    </script>

</body>
